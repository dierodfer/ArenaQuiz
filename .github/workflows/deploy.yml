name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fallar pronto y con un mensaje claro si faltan los secrets, en vez de
      # publicar un bundle roto (el SDK lanzaría "supabaseKey is required" en
      # el navegador). Configúralos en Settings → Secrets and variables → Actions.
      - name: Verify Supabase secrets are set
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          missing=0
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::Falta el secret VITE_SUPABASE_URL"; missing=1
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::Falta el secret VITE_SUPABASE_PUBLISHABLE_KEY"; missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Configúralos en Settings → Secrets and variables → Actions y vuelve a lanzar el deploy."
            exit 1
          fi

      - run: npm run build
        env:
          GITHUB_PAGES: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
